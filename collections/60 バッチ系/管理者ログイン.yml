info:
  name: 管理者ログイン
  type: http
  seq: 2

http:
  method: POST
  url: "{{url}}/login"
  body:
    type: json
    data: |-
      {
        "user_id": "admin",
        "passwd": "12345678",
        "division": "cross",
        "lang": "ja"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res && res.body && res.body.data) {
          let data = res.body.data;
          
          if (data.access_token) {
            bru.setVar("auth_token", data.access_token);
            console.log("✅ Token set successfully: " + data.access_token);
          } else {
            console.error("❌ access_token not found in response");
            console.log("Response data:", JSON.stringify(data, null, 2));
          }
        } else {
          console.error("❌ Response or response body is null");
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
