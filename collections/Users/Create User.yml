info:
  name: Create User
  type: http
  seq: 3

http:
  method: POST
  url: "{{url}}/users"
  body:
    type: json
    data: |-
      {
        "user_id": "test_user",
        "password": "secret",
        "first_name": "first",
        "last_name": "last",
        "email": "test_user@example.com"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
