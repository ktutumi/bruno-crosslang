info:
  name: Translate JavaScript
  type: http
  seq: 11

http:
  method: POST
  url: "{{ts_host}}/clsoap/clsoap.cgi"
  body:
    type: text
    data: |
      <SOAP-ENV:Envelope
              xmlns:SOAP-ENV="http://schemas.xmlsoap.org/soap/envelope/"
              xmlns:SOAP-ENC="http://schemas.xmlsoap.org/soap/encoding/"
              xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
              xmlns:xsd="http://www.w3.org/2001/XMLSchema"
              xmlns:cl="http://crosslanguage.co.jp/clsoap/2/schema">
          <SOAP-ENV:Body>

              <cl:Translate>
                  <licence>ktutumi0307_sc/service a7e8ba2069a5bb677b995697f216f892d97d628a</licence>
                  <clientid>[ktutumi-dev]tsclient3 5.4.2</clientid>
                  <reqgroup></reqgroup>
                  <select></select>
                  <engine>
                      <eid>CR-JE-NMT</eid>
                      <prop>
                          <item>
                              <key>dictionaries</key>
                              <val></val>
                          </item>
                       </prop>
                  </engine>
                  <rules>
      @data javascript {
        
        base-url: "https://www.toshokan.city.shizuoka.jp/js/core.js";
        
      }


      @urlmap RewriteImage {
        

        
      }

      @urlmap RewriteCSSURL {
        

        
      }

      @urlmap RewriteALinkURL {
        

        
      }

      @rewrite DefaultRewriteURL {
        if (url matches "^$") return "";
        if (url matches "^data:") return "{url}";
        if (url matches "^#") return "{url}";
        if (url matches "^\\?") return "{url}";
        
        if (absurl matches "^https://www.toshokan.city.shizuoka.jp/(.*)") apply "https://www-toshokan-city-shizuoka-jp-e.athp.transer.com/{$1}";
        
        if (absurl matches "^https://202.247.60.253/(.*)") apply "https://202-247-60-253-e.athp.transer.com/{$1}";
        

        if (absurl matches "^http") return "{url}";

        

        return "{absurl}";
      }

      @rewrite RewriteRules {
        apply @RewriteImage;
        apply @RewriteCSSURL;
        apply @RewriteAlinkURL;
        return @DefaultRewriteURL;
      }

      :html-url-attributes, :css, :javascript {
        attribute: * rewrite @RewriteRules;
      }

      @postprocess {
        replace: 'www-toshokan-city-shizuoka-jp-[a-zA-Z]{1,4}\\.athp\\.transer\\.com\\/(.+);'
                 'www.toshokan.city.shizuoka.jp/$1;';
      }
                  </rules>
                  <indata></indata>
              </cl:Translate>

          </SOAP-ENV:Body>
      </SOAP-ENV:Envelope>
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
