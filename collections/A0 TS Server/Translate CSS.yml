info:
  name: Translate CSS
  type: http
  seq: 24

http:
  method: POST
  url: "{{ts_host}}/clsoap/clsoap.cgi"
  body:
    type: text
    data: |
      <SOAP-ENV:Envelope
              xmlns:SOAP-ENV="http://schemas.xmlsoap.org/soap/envelope/"
              xmlns:SOAP-ENC="http://schemas.xmlsoap.org/soap/encoding/"
              xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
              xmlns:xsd="http://www.w3.org/2001/XMLSchema"
              xmlns:cl="http://crosslanguage.co.jp/clsoap/2/schema">
          <SOAP-ENV:Body>

              <cl:Translate>
                  <licence>ktutumi0307_sc/service a7e8ba2069a5bb677b995697f216f892d97d628a</licence>
                  <clientid>ktutumi-dev-wt-sitectl 0.9.0</clientid>
                  <reqgroup></reqgroup>
                  <select></select>
                  <engine>
                      <eid>CR-JE</eid>
                      <prop>
                          <item>
                              <key>dictionaries</key>
                              <val></val>
                          </item>
                      </prop>
                  </engine>
                  <rules>
      @data css {
        base-url: "https://cross31.webt-homepage.net/en/testsite_31/wp-content/themes/newscrunch/assets/css/font-awesome/css/all.min.css?ver=6.8.3&amp;crosslang_ts_log=1&amp;crosslang_preview_flag=true";
      }

      @urlmap RewriteImage {
        "http://wpthemetestdata.files.wordpress.com/2013/03/image-alignment-580x100.jpg": "https://www.crosslanguage.co.jp/images/products/pc-transer-v26/img.jpg?&amp;crosslang_url_count=1";

        "http://wpthemetestdata.files.wordpress.com/2013/03/image-alignment-580x200.jpg": "https://www.crosslanguage.co.jp/images/products/pc-transer-v26/img.jpg?&amp;crosslang_url_count=2";
      }

      @urlmap RewriteCSSURL {
      }

      @urlmap RewriteALinkURL {
      }

      @rewrite DefaultRewriteURL {
        if (url matches "^$") return "";
        if (url matches "^data:") return "{absurl}";
        if (url matches "^#") return "{absurl}";
        if (url matches "^\\?") return "{absurl}";

        return "{absurl}";
      }

      @rewrite RewriteRules {
        apply @RewriteImage;
        apply @RewriteCSSURL;
        apply @RewriteAlinkURL;
        return @DefaultRewriteURL;
      }

      :html-url-attributes, :css, :javascript {
        attribute: * rewrite @RewriteRules;
      }
                  </rules>
                  <indata>dXJsKC4uL3dlYmZvbnRzL2ZhLXJlZ3VsYXItNDAwLndvZmYyKQ==</indata>
              </cl:Translate>

          </SOAP-ENV:Body>
      </SOAP-ENV:Envelope>
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        // Test 1: Status code is 200
        test("Status code is 200", function () {
            expect(res.getStatus()).to.equal(200);
        });

        // Test 2: Response body contains a valid SOAP envelope
        test("Response contains a valid SOAP envelope", function () {
            var responseBody = JSON.stringify(res.getBody());
            expect(responseBody).to.include("<SOAP-ENV:Envelope");
            expect(responseBody).to.include("</SOAP-ENV:Envelope>");
        });

        // Test 3: Translation output data is present and base64 encoded
        test("Translation output data is present and base64 encoded", function () {
            var responseBody = JSON.stringify(res.getBody());
            var jsonObject = xml2Json(responseBody);
            // Navigate to the outdata node
            var outdata = null;
            try {
                outdata = jsonObject["SOAP-ENV:Envelope"]["SOAP-ENV:Body"]["cl:TranslateResponse"].outdata;
            } catch (e) {}
            expect(outdata, "outdata field should be present").to.exist;
            // Check if outdata is a non-empty string
            expect(typeof outdata).to.equal("string");
            expect(outdata.length).to.be.above(0);
            // Check if outdata is valid base64 (basic check)
            var base64Regex = /^(?:[A-Za-z0-9+\/]{4})*(?:[A-Za-z0-9+\/]{2}==|[A-Za-z0-9+\/]{3}=)?$/;
            expect(base64Regex.test(outdata)).to.be.true;
        });

        // Test 4: Decoded outdata matches the expected string
        test("Decoded outdata matches expected string", function () {
            var responseBody = JSON.stringify(res.getBody());
            var jsonObject = xml2Json(responseBody);
            var outdata = null;
            try {
                outdata = jsonObject["SOAP-ENV:Envelope"]["SOAP-ENV:Body"]["cl:TranslateResponse"].outdata;
            } catch (e) {}
            expect(outdata, "outdata field should be present").to.exist;
            // Decode base64
            var decoded = "";
            try {
                decoded = Buffer.from(outdata, 'base64').toString('utf8');
            } catch (err) {
                decoded = atob(outdata);
            }
            var expected = "url(https://cross31.webt-homepage.net/en/testsite_31/wp-content/themes/newscrunch/assets/css/font-awesome/webfonts/fa-regular-400.woff2)";
            expect(decoded).to.eql(expected);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
