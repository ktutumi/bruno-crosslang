    data: |
      <Envelope xmlns="http://schemas.xmlsoap.org/soap/envelope/"
                xmlns:cl="http://crosslanguage.co.jp/clsoap/2/schema"
                xmlns:xsd="http://www.w3.org/2001/XMLSchema"
                xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance">
        <Body xmlns="http://schemas.xmlsoap.org/soap/envelope/">
          <Translate xmlns="http://crosslanguage.co.jp/clsoap/2/schema">
            <licence>ticket-chikebo/service 0f72c5868a11e20264046adf05f04ade66799688</licence>
            <clientid>ktutumi-dev-wt-sitectl 0.9.0</clientid>
            <engine>
              <eid>PASSTHRU</eid>
              <prop></prop>
            </engine>
            <rules>
              @data html {
                base-url: "https://ticket.chikebo.jp/show/event.html?info=12474";
                fragment: true;
                output: hpedit;
              }
          @preprocess {
            replace: '(<div class="evt__date" clelid="\\d+">)([^<]+)(<span class="[^"]*" clelid="\\d+">[^<]+</span>)'
                     '$1$2<br style="display:none;">(<br style="display:none;">$3<br style="display:none;">)';
          }
            </rules>
            <indata>
              
            </indata>
          </Translate>
        </Body>
