info:
  name: "[本番]Translate HTML hpedit"
  type: http
  seq: 6

http:
  method: POST
  url: "{{ts_host}}/clsoap/clsoap.cgi"
  body:
    type: text
    data: |-
      <Envelope xmlns="http://schemas.xmlsoap.org/soap/envelope/"
          xmlns:cl="http://crosslanguage.co.jp/clsoap/2/schema"
          xmlns:xsd="http://www.w3.org/2001/XMLSchema"
          xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance">
          <Body xmlns="http://schemas.xmlsoap.org/soap/envelope/">
              <Translate xmlns="http://crosslanguage.co.jp/clsoap/2/schema">
                  <licence>amu-n/service e7759ee0d57dbbe86c64132e8a87036754477d7f</licence>
                  <clientid>dev-wt-sitectl 0.9.0</clientid>
                  <engine>
                      <eid>CR-JC-NMT</eid>
                      <prop>
                          <item>
                              <key>dictionaries</key>
                              <val>56232,56234,210,711,712,713</val>
                          </item>
                      </prop>
                  </engine>
                  <rules>
      @data html {

      base-url: "https://www.amu-n.co.jp";

      }

      .cl-notranslate {
      content: ignore;
      }

      a.cl-norewrite, .cl-norewrite a {
      attribute: href rewrite "{absurl}" !important;
      }

      img.cl-norewrite, .cl-norewrite img {
      attribute: src rewrite "{absurl}" !important;
      }

      input, textarea {
      attribute: placeholder translate;
      }


      @urlmap RewriteImage {

      "https://www.amu-n.co.jp/uploads/images/resized/1365x840/amunagasaki/000002/000002/9170abaa.jpg": "https://amu-n.pictona.jp/scc-admin/asset/amunagasaki/000002/000002/0791000e.jpg
      ";

      "https://www.amu-n.co.jp/uploads/images/resized/1365x840/amunagasaki/000002/000002/62e23fb6.jpg": "https://amu-n.pictona.jp/scc-admin/asset/amunagasaki/000002/000002/cd7c4932.jpg";

      "https://www.amu-n.co.jp/uploads/images/resized/1365x840/amunagasaki/000002/000002/e3c04c73.jpg": "https://amu-n.pictona.jp/scc-admin/asset/amunagasaki/000002/000002/9d490907.jpg";

      "https://www.amu-n.co.jp/uploads/images/resized/1365x840/amunagasaki/000002/000002/50da6060.jpg": "https://amu-n.pictona.jp/scc-admin/asset/amunagasaki/000002/000002/1cb20fe8.jpg";

      "https://www.amu-n.co.jp/uploads/images/resized/1365x840/amunagasaki/000002/000002/97ccc892.jpg": "https://amu-n.pictona.jp/scc-admin/asset/amunagasaki/000002/000002/399d7754.jpg";

      "https://www.amu-n.co.jp/uploads/images/resized/1365x840/amunagasaki/000002/000002/cf566244.png": "https://www.amu-n.co.jp/uploads/images/resized/0x0/amunagasaki/000002/000002/dda44eae.png";

      "https://www.amu-n.co.jp/uploads/images/resized/1365x840/amunagasaki/000002/000002/d28d8e9d.png": "https://www.amu-n.co.jp/uploads/images/resized/0x0/amunagasaki/000002/000002/fb124162.png";

      "https://www.amu-n.co.jp/uploads/images/resized/1365x840/amunagasaki/000002/000002/e9bb4ed9.jpg": "https://amu-n.pictona.jp/scc-admin/asset/amunagasaki/000002/000002/de9c6903.jpg";

      "https://www.amu-n.co.jp/uploads/images/resized/1365x840/amunagasaki/000002/000002/18324cb4.jpg": "https://amu-n.pictona.jp/scc-admin/asset/amunagasaki/000002/000002/ed6970dd.jpg";

      "https://www.amu-n.co.jp/uploads/images/resized/1365x840/amunagasaki/000002/000002/70398653.png": "https://amu-nagasaki.pictona.jp/scc-admin/asset/amunagasaki/000002/000002/0a00521b.jpg";

      "https://www.amu-n.co.jp/uploads/images/resized/1365x840/amunagasaki/000002/000002/6e23c730.jpg": "https://amu-n.pictona.jp/scc-admin/asset/amunagasaki/000002/000002/8fcd18f6.jpg";



      }

      @urlmap RewriteCSSURL {



      }

      @urlmap RewriteALinkURL {

      "https://www.amu-n.co.jp/assets-static/pdf/floorguide_web.pdf": "https://amu-n.pictona.jp/scc-admin/asset/amunagasaki/000002/000002/ef0c64cf.pdf";



      }

      @rewrite DefaultRewriteURL {
      if (url matches "^$") return "";
      if (url matches "^data:") return "{url}";
      if (url matches "^#") return "{url}";
      if (url matches "^\\?") return "{url}";

      if (absurl matches "^https://www.amu-n.co.jp/(.*)") apply "https://www-amu-n-co-jp-c.athp.transer.com/{$1}";

      if (absurl matches "^https://amu-n-test-web2.pictona.jp/(.*)") apply "https://amu-n-test-web2-pictona-jp-c.athp.transer.com/{$1}";


      if (absurl matches "^http") return "{url}";



      return "{absurl}";
      }

      @rewrite RewriteRules {
      apply @RewriteImage;
      apply @RewriteCSSURL;
      apply @RewriteAlinkURL;
      return @DefaultRewriteURL;
      }

      :html-url-attributes, :css, :javascript {
      attribute: * rewrite @RewriteRules;
      }




                  </rules>

                  <indata></indata>
              </Translate>
          </Body>
      </Envelope>
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
