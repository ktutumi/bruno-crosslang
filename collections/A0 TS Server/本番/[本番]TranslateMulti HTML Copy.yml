info:
  name: "[本番]TranslateMulti HTML Copy"
  type: http
  seq: 13

http:
  method: POST
  url: "{{ts_host}}/clsoap/clsoap.cgi"
  body:
    type: text
    data: |-
      <Envelope xmlns="http://schemas.xmlsoap.org/soap/envelope/"
        xmlns:cl="http://crosslanguage.co.jp/clsoap/2/schema"
        xmlns:xsd="http://www.w3.org/2001/XMLSchema"
        xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance">
        <Body xmlns="http://schemas.xmlsoap.org/soap/envelope/">
          <TranslateMulti xmlns="http://crosslanguage.co.jp/clsoap/2/schema">
            <licence>jrtk/service 0c35b08f0342a1a827d82d37d26b5c1dd5d3ddd2</licence>
            <clientid>ktutumi-dev-wt-sitectl 0.9.0</clientid>
            <engine>
              <eid>CR-JE-NMT</eid>
              <prop>
                <item>
                  <key>dictionaries</key>
                  <val>55329,55331,204,701,702,703</val>
                </item>
              </prop>
            </engine>
            <rules>
      @data html {
        fragment: true;
        base-url: "https://beans.jrtk.jp/asagaya/";
        
      }

      .cl-notranslate {
       content: ignore;
      }

      a.cl-norewrite, .cl-norewrite a {
        attribute: href rewrite "{absurl}" !important;
      }

      img.cl-norewrite, .cl-norewrite img {
        attribute: src rewrite "{absurl}" !important;
      }

      input, textarea {
        attribute: placeholder translate;
      }


      @urlmap RewriteImage {
        

        
      }

      @urlmap RewriteCSSURL {
        

        
      }

      @urlmap RewriteALinkURL {
        

        
      }

      @rewrite DefaultRewriteURL {
        if (url matches "^$") return "";
        if (url matches "^data:") return "{url}";
        if (url matches "^#") return "{url}";
        if (url matches "^\\?") return "{url}";
        
        if (absurl matches "^https://beans.jrtk.jp/(.*)") apply "https://beans-jrtk-jp-e.athp.transer.com/{$1}";
        
        if (absurl matches "^https://www.stg-jrtk.jp/(.*)") apply "https://www-stg-jrtk-jp-e.athp.transer.com/{$1}";
        
        if (absurl matches "^https://shapo.jrtk.jp/(.*)") apply "https://shapo-jrtk-jp-e.athp.transer.com/{$1}";
        
        if (absurl matches "^https://www.jrtk.jp/(.*)") apply "https://www-jrtk-jp-e.athp.transer.com/{$1}";
        

        if (absurl matches "^http") return "{url}";

        

        return "{absurl}";
      }

      @rewrite RewriteRules {
        apply @RewriteImage;
        apply @RewriteCSSURL;
        apply @RewriteAlinkURL;
        return @DefaultRewriteURL;
      }

      :html-url-attributes, :css, :javascript {
        attribute: * rewrite @RewriteRules;
      }




            </rules>
            <indata>
              <item>
                <data></data>
              </item>
              <item>
                <data></data>
              </item>
              <item>
                <data></data>
              </item>
              <item>
                <data></data>
              </item>
              <item>
                <data></data>
              </item>
              <item>
                <data></data>
              </item>
            </indata>
          </TranslateMulti>
        </Body>
      </Envelope>
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
