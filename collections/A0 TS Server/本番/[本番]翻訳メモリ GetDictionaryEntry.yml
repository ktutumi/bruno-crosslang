info:
  name: "[本番]翻訳メモリ GetDictionaryEntry"
  type: http
  seq: 3

http:
  method: POST
  url: "{{ts_host}}/clsoap/clsoap.cgi"
  body:
    type: text
    data: |
      <SOAP-ENV:Envelope xmlns:SOAP-ENV="http://schemas.xmlsoap.org/soap/envelope/"
          xmlns:SOAP-ENC="http://schemas.xmlsoap.org/soap/encoding/"
          xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
          xmlns:xsd="http://www.w3.org/2001/XMLSchema"
          xmlns:cl="http://crosslanguage.co.jp/clsoap/2/schema">
          <SOAP-ENV:Body>

              <cl:GetDictionaryEntry>
                  <licence>customer-n/service 715ff23fb6711295ea82cfeda94637003491e03d</licence>
                  <clientid>[ktutumi-dev]tsclient3 5.4.2</clientid>
                  <reqgroup></reqgroup>
                  <select></select>

                  <did>50383</did>
                  <format></format>
                  <rangeStart>0</rangeStart>
                  <rangeCount>1000</rangeCount>
              </cl:GetDictionaryEntry>

          </SOAP-ENV:Body>
      </SOAP-ENV:Envelope>
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

