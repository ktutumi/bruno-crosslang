info:
  name: "[本番]TranslateMulti HTML"
  type: http
  seq: 12

http:
  method: POST
  url: "{{ts_host}}/clsoap/clsoap.cgi"
  body:
    type: text
    data: |
      <SOAP-ENV:Envelope
              xmlns:SOAP-ENV="http://schemas.xmlsoap.org/soap/envelope/"
              xmlns:SOAP-ENC="http://schemas.xmlsoap.org/soap/encoding/"
              xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
              xmlns:xsd="http://www.w3.org/2001/XMLSchema"
              xmlns:cl="http://crosslanguage.co.jp/clsoap/2/schema">
          <SOAP-ENV:Body>

              <cl:TranslateMulti>
                  <licence>jrtk/service 0c35b08f0342a1a827d82d37d26b5c1dd5d3ddd2</licence>
                  <clientid>[ktutumi-dev]tsclient3 5.4.2</clientid>
                  <reqgroup></reqgroup>
                  <select></select>
                  <engine>
                      <eid>CR-JE-NMT</eid>
                      <prop>
                          <item>
                              <key>dictionaries</key>
                              <val></val>
                          </item>
                      </prop>
                  </engine>
                  <rules>
      @data html {
          fragment: true;
          base-url: "https://beans.jrtk.jp/asagaya";
          output: hpedit;
          tag: clid 1;
      }
                  </rules>
                  <indata><item><data>
                  </data></item></indata>
              </cl:TranslateMulti>

          </SOAP-ENV:Body>
      </SOAP-ENV:Envelope>
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
