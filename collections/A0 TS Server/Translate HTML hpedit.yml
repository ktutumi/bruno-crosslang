info:
  name: Translate HTML hpedit
  type: http
  seq: 20

http:
  method: POST
  url: "{{ts_host}}/clsoap/clsoap.cgi"
  body:
    type: text
    data: |
      <Envelope xmlns="http://schemas.xmlsoap.org/soap/envelope/"
                xmlns:cl="http://crosslanguage.co.jp/clsoap/2/schema"
                xmlns:xsd="http://www.w3.org/2001/XMLSchema"
                xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance">
        <Body xmlns="http://schemas.xmlsoap.org/soap/envelope/">
          <Translate xmlns="http://crosslanguage.co.jp/clsoap/2/schema">
            <licence>ktutumi0307_sc/service a7e8ba2069a5bb677b995697f216f892d97d628a</licence>
            <clientid>ktutumi-dev-wt-sitectl 0.9.0</clientid>
            <engine>
              <eid>CR-JE-NMT</eid>
              <prop></prop>
            </engine>
      <rules>
      @data html {
        base-url: "https://h40.local-transer.net/test.html";
      }

      .cl-notranslate {
       content: ignore;
      }

      a.cl-norewrite, .cl-norewrite a {
        attribute: href rewrite "{absurl}" !important;
      }

      img.cl-norewrite, .cl-norewrite img {
        attribute: src rewrite "{absurl}" !important;
      }

      input, textarea {
        attribute: placeholder translate;
      }

      @urlmap RewriteImage {
        "https://admin.jsbc.jp/store/images/blobs/redirect/eyJfcmFpbHMiOnsiZGF0YSI6MjkzNywicHVyIjoiYmxvYl9pZCJ9fQ==--e1543dd187284046832c21a8a46c19f2f62a1299/psj_skateboard_academy.jpg": "https://h40.local-transer.net/images/eyecatch1.jpg";
        "https://h40.local-transer.net/images/eyecatch2.jpg": "https://h40.local-transer.net/images/eyecatch3.jpg";
      }

      @urlmap RewriteCSSURL {
      }

      @urlmap RewriteALinkURL {
      }

      @rewrite DefaultRewriteURL {
        if (url matches "^$") return "";
        if (url matches "^data:") return "{url}";
        if (url matches "^#") return "{url}";
        if (url matches "^\\?") return "{url}";
        if (url matches "^(?:tel|mailto|javascript|sms|fax):") return "{url}";
        
        if (absurl matches "^https://h40.local-transer.net/(.*)") apply "https://h40-e.local-transer.net/{$1}";
        
        if (absurl matches "^https://www.h40.local-transer.net/(.*)") apply "https://www-h40-e.local-transer.net/{$1}";
        

        if (absurl matches "^http") return "{url}";

        return "{absurl}";
      }

      @rewrite RewriteRules {
        apply @RewriteImage;
        apply @RewriteCSSURL;
        apply @RewriteAlinkURL;
        return @DefaultRewriteURL;
      }

      :html-url-attributes, :css, :javascript {
        attribute: * rewrite @RewriteRules;
      }
      </rules>
      <indata></indata>    </Translate>
        </Body>
      </Envelope>
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
