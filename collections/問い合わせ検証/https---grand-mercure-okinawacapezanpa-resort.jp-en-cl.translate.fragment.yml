p-550x320.jpg\\" alt=\\"Cape Zanpa Park\\" loading=\\"lazy\\" clelid=\\"1111\\">\\n\\t\\t\\t\\t\\t\\t\\t\\t\\t<h3 clelid=\\"1112\\">Cape Zanpa Park</h3>\\n\\t\\t\\t\\t\\t\\t\\t\\t\\t<p clelid=\\"1113\\">◆Cape Zanpa Park is a 30-meter-high cliff in Cape Zanpa that lasts about 2 km. The waves that hit a rock and violently scatter white droplets are rare in the Okinawan sea, and it is a brave and masculine scenery.</p>\\n\\t\\t\\t\\t\\t\\t\\t\\t</div>\\n\\t\\t\\t\\t\\t\\t\\t\\t\\t\\t\\t\\t\\t\\t\\t</a><\u0021-- .card -->\\n\\t\\t\\t\\t\\t\\t\\t\\t\\t\\t\\t\\t</div><\u0021-- .sightseeing-posts -->\\n\\t\\t\\t\\t\\t</div><\u0021-- #frontExp -->\\n\\t\\t\\t\\t\\t<div id=\\"sightseeingDots\\" clelid=\\"1114\\"></div>\\n\\t\\t\\t\\t\\t<div class=\\"btn-round-wide\\" clelid=\\"1115\\"><a href=\\"https://grand-mercure-okinawacapezanpa-resort.jp/en/sightseeing/\\" clelid=\\"1116\\">View More</a></div>\\n\\t\\t\\t\\t</div><\u0021-- .inner -->\\n\\t\\t\\t</section><\u0021-- .section-experiences -->\\n\\t\\t\\t\\n\\t\\t\\t\\t\\t\\t<section id=\\"front-gallery\\" class=\\"front-gallery\\" clelid=\\"1117\\">\\n\\t\\t\\t\\t<h2 class=\\"front-section-title\\" clelid=\\"1118\\"><b clelid=\\"1119\\">INSTAGRAM</b><br style=\\"display:none;\\" clelid=\\"1120\\"><small clelid=\\"1121\\">Follow the hotel official Instagram to check out the latest information\u0021</small></h2>\\n\\t\\t\\t\\t<div id=\\"galleryTop\\" class=\\"swiper-initialized swiper-horizontal swiper-free-mode\\" cl-id=\\"60\\" cl-status=\\"translating\\" clelid=\\"361\\">\\n\\t\\t\\t\\t\\t<div class=\\"swiper-wrapper\\" id=\\"swiper-wrapper-13d7aac6c4cfff04\\" aria-live=\\"off\\" style=\\"transition-duration: 7000ms; transform: translate3d(-270.333px, 0px, 0px);\\" clelid=\\"362\\">\\n\\t\\t\\t\\t\\t\\t\\t\\t\\t\\t\\t\\t\\t\\t\\t\\t\\t\\t\\t\\t\\t\\t<div class=\\"swiper-slide swiper-slide-prev\\" style=\\"width: 250.333px; margin-right: 20px;\\" role=\\"group\\" aria-label=\\"1 / 20\\" data-swiper-slide-index=\\"0\\" clel