info:
  name: 明日香村観光サイト_02_修正後
  type: http
  seq: 7

http:
  method: POST
  url: "{{ts_host}}/clsoap/clsoap.cgi"
  body:
    type: text
    data: |
      <!--
      【明日香村観光サイト】プレビュー編集の表示について
      https://app.asana.com/1/1200609152398031/project/1204317818187227/task/1213916486259660?focus=true
      -->
      <Envelope xmlns="http://schemas.xmlsoap.org/soap/envelope/" xmlns:cl="http://crosslanguage.co.jp/clsoap/2/schema" xmlns:xsd="http://www.w3.org/2001/XMLSchema" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"><Body xmlns="http://schemas.xmlsoap.org/soap/envelope/"><Translate xmlns="http://crosslanguage.co.jp/clsoap/2/schema"><licence>asukamura/service 3dc88fe374d8eb3ad6e62708c1b81f8f7c8964f1</licence><clientid>dev-wt-sitectl 0.9.0</clientid><engine><eid>CR-JE-NMT</eid><prop><item><key>dictionaries</key><val>56781,56783,204,701,702,703</val></item></prop></engine><rules>
      @data html {
        
        base-url: "https://asukamura.com/field-museum-asuka/";
        output: hpedit; tag: clid 0;
      }

      .cl-notranslate {
       content: ignore;
      }

      a.cl-norewrite, .cl-norewrite a {
        attribute: href rewrite "{absurl}" !important;
      }

      img.cl-norewrite, .cl-norewrite img {
        attribute: src rewrite "{absurl}" !important;
      }

      input, textarea {
        attribute: placeholder translate;
      }


      @urlmap RewriteImage {
        
        "https://asukamura.com/sld/arusa_01a.jpg": "https://storage.googleapis.com/wt-cross/asukamura.com/images/09/0932621ee5631added2ddda8e775644c581c15eb11010c242f272b96c04a0620.jpeg";
        

        
          
        "https://asukamura.com/sld/arusa_01a.jpg": "https://storage.googleapis.com/wt-cross/asukamura.com/images/09/0932621ee5631added2ddda8e775644c581c15eb11010c242f272b96c04a0620.jpeg?&amp;crosslang_url_count=1";
          
        
      }

      @urlmap RewriteCSSURL {
        

        
          
        
      }

      @urlmap RewriteALinkURL {
        

        
          
        
      }

      @rewrite DefaultRewriteURL {
        if (url matches "^$") return "";
        if (url matches "^data:") return "{url}";
        if (url matches "^#") return "{url}";
        if (url matches "^\\?") return "{url}";
        if (url matches "^(?:tel|mailto|javascript|sms|fax):") return "{url}";
        
        if (absurl matches "^https://asukamura.com/(.*)") apply "https://en.asukamura.com/{$1}";
        
        if (absurl matches "^https://asukamura.sakuraweb.com/(.*)") apply "https://en.asukamura.sakuraweb.com/{$1}";
        

        if (absurl matches "^http") return "{url}";

        return "{absurl}";
      }

      @rewrite RewriteRules {
        apply @RewriteImage;
        apply @RewriteCSSURL;
        apply @RewriteAlinkURL;
        return @DefaultRewriteURL;
      }

      :html-url-attributes, :css, :javascript {
        attribute: * rewrite @RewriteRules;
      }

      p.pLeadBlock__text button { text-flow: inline-pair; }

      @preprocess {
        replace: '&lt;!-- crosslanguage:show(.*?)/crosslanguage:show --&gt;'
                 '$1';
      }

      @preprocess {
        replace: '&lt;!-- crosslanguage-e:show(.*?)/crosslanguage-e:show --&gt;'
                 '$1';
      }



      </rules><indata></indata></Translate></Body></Envelope>
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        // Test 1: Status code is 200
        test("Status code is 200", function () {
            expect(res.getStatus()).to.equal(200);
        });

        // Test 2: Response body contains a valid SOAP Envelope
        test("Response contains a valid SOAP Envelope", function () {
            var responseBody = JSON.stringify(res.getBody());
            expect(responseBody).to.include("<SOAP-ENV:Envelope");
            expect(responseBody).to.include("</SOAP-ENV:Envelope>");
        });

        // Test 3: TranslateResponse element is present in the response XML
        test("TranslateResponse element is present", function () {
            var responseBody = JSON.stringify(res.getBody());
            var jsonObject = xml2Json(responseBody);
            // Traverse to find TranslateResponse
            var envelope = jsonObject["SOAP-ENV:Envelope"] || jsonObject.Envelope;
            expect(envelope).to.be.an("object");
            var body = envelope["SOAP-ENV:Body"] || envelope.Body;
            expect(body).to.be.an("object");
            var translateResponse = body["cl:TranslateResponse"] || body.TranslateResponse;
            expect(translateResponse, "TranslateResponse element should be present").to.exist;
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
